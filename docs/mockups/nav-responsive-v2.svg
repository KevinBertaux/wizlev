<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">ManabuPlay Navigation Redesign Mockup v2</title>
  <desc id="desc">Cleaner responsive navigation with reduced borders and tighter radius values.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="active2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#6fe7dd"/>
    </linearGradient>
    <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#203047" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg2)"/>

  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#243041">Navigation UI v2 - Cleaner</text>

  <!-- Desktop frame -->
  <rect x="60" y="110" width="980" height="780" rx="20" fill="#ffffff" filter="url(#softShadow2)"/>
  <text x="94" y="156" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#243041">Desktop</text>

  <rect x="90" y="182" width="920" height="74" rx="14" fill="#ffffff"/>
  <text x="108" y="227" font-family="Segoe UI, Arial" font-size="30" font-weight="800" fill="#243041">Manabu</text>
  <text x="212" y="227" font-family="Segoe UI, Arial" font-size="30" font-weight="800" fill="#5bbf5a">Play</text>

  <rect x="620" y="196" width="84" height="44" rx="10" fill="#f3f7fc"/>
  <text x="642" y="224" font-family="Segoe UI, Arial" font-size="20" fill="#33455b">Math</text>

  <rect x="714" y="196" width="108" height="44" rx="10" fill="url(#active2)"/>
  <text x="732" y="224" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#ffffff">Langues</text>

  <rect x="832" y="196" width="122" height="44" rx="10" fill="#f3f7fc"/>
  <text x="853" y="224" font-family="Segoe UI, Arial" font-size="20" fill="#33455b">A propos</text>

  <rect x="90" y="286" width="920" height="566" rx="16" fill="#f7fbff"/>
  <text x="122" y="350" font-family="Segoe UI, Arial" font-size="40" font-weight="800" fill="#243041">Page content area</text>

  <!-- Mobile frame -->
  <rect x="1100" y="110" width="430" height="780" rx="26" fill="#ffffff" filter="url(#softShadow2)"/>
  <text x="1130" y="156" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#243041">Mobile</text>

  <rect x="1128" y="184" width="374" height="68" rx="12" fill="#ffffff"/>
  <text x="1148" y="226" font-family="Segoe UI, Arial" font-size="25" font-weight="800" fill="#243041">Manabu</text>
  <text x="1237" y="226" font-family="Segoe UI, Arial" font-size="25" font-weight="800" fill="#5bbf5a">Play</text>

  <rect x="1452" y="198" width="36" height="36" rx="8" fill="#f3f7fc"/>
  <rect x="1462" y="208" width="16" height="2.6" rx="1.3" fill="#364b63"/>
  <rect x="1462" y="215" width="16" height="2.6" rx="1.3" fill="#364b63"/>
  <rect x="1462" y="222" width="16" height="2.6" rx="1.3" fill="#364b63"/>

  <rect x="1220" y="262" width="282" height="278" rx="14" fill="#ffffff" filter="url(#softShadow2)"/>

  <rect x="1236" y="280" width="250" height="46" rx="10" fill="#f3f7fc"/>
  <text x="1331" y="310" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" fill="#33455b">Math</text>

  <rect x="1236" y="334" width="250" height="46" rx="10" fill="url(#active2)"/>
  <text x="1331" y="364" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#ffffff">Langues</text>

  <rect x="1236" y="388" width="250" height="46" rx="10" fill="#f3f7fc"/>
  <text x="1331" y="418" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" fill="#33455b">A propos</text>

  <rect x="1236" y="442" width="250" height="46" rx="10" fill="#f3f7fc"/>
  <text x="1331" y="472" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" fill="#33455b">Confidentialite</text>

  <rect x="1128" y="572" width="374" height="280" rx="16" fill="#f7fbff"/>
  <text x="1160" y="634" font-family="Segoe UI, Arial" font-size="34" font-weight="800" fill="#243041">Content</text>

  <text x="70" y="934" font-family="Segoe UI, Arial" font-size="24" fill="#4b5f79">v2: moins de bordures visibles, rayons plus petits, navigation plus nette.</text>
</svg>
