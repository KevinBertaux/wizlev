<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">ManabuPlay Navigation Redesign Mockup</title>
  <desc id="desc">Responsive navigation concept with desktop floating top bar and mobile drawer menu.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#6fe7dd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#203047" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#243041">Navigation UI v1 - Responsive</text>

  <!-- Desktop Frame -->
  <rect x="60" y="110" width="980" height="780" rx="28" fill="#ffffff" stroke="#d9e1ed" stroke-width="2" filter="url(#shadow)"/>
  <text x="94" y="156" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#243041">Desktop</text>

  <rect x="90" y="180" width="920" height="84" rx="24" fill="#ffffff" stroke="#d9e1ed" stroke-width="1.5"/>
  <rect x="106" y="196" width="188" height="52" rx="16" fill="#f2fbfb" stroke="#d9efec"/>
  <text x="126" y="230" font-family="Segoe UI, Arial" font-size="30" font-weight="800" fill="#243041">Manabu</text>
  <text x="230" y="230" font-family="Segoe UI, Arial" font-size="30" font-weight="800" fill="#5bbf5a">Play</text>

  <rect x="598" y="196" width="92" height="52" rx="16" fill="#f6f8fc"/>
  <text x="623" y="228" font-family="Segoe UI, Arial" font-size="22" fill="#33455b">Math</text>

  <rect x="704" y="196" width="116" height="52" rx="16" fill="url(#pill)"/>
  <text x="724" y="228" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#ffffff">Langues</text>

  <rect x="834" y="196" width="132" height="52" rx="16" fill="#f6f8fc"/>
  <text x="858" y="228" font-family="Segoe UI, Arial" font-size="22" fill="#33455b">A propos</text>

  <rect x="90" y="292" width="920" height="560" rx="24" fill="#f7fbff" stroke="#e4edf7"/>
  <text x="126" y="356" font-family="Segoe UI, Arial" font-size="42" font-weight="800" fill="#243041">Page content area</text>

  <!-- Mobile Frame -->
  <rect x="1100" y="110" width="430" height="780" rx="38" fill="#ffffff" stroke="#d9e1ed" stroke-width="2" filter="url(#shadow)"/>
  <text x="1130" y="156" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#243041">Mobile</text>

  <rect x="1128" y="180" width="374" height="76" rx="22" fill="#ffffff" stroke="#d9e1ed" stroke-width="1.5"/>
  <text x="1150" y="225" font-family="Segoe UI, Arial" font-size="26" font-weight="800" fill="#243041">Manabu</text>
  <text x="1242" y="225" font-family="Segoe UI, Arial" font-size="26" font-weight="800" fill="#5bbf5a">Play</text>

  <rect x="1448" y="197" width="40" height="40" rx="10" fill="#f2f6fc" stroke="#d9e1ed"/>
  <rect x="1459" y="208" width="18" height="2.8" rx="1.4" fill="#364b63"/>
  <rect x="1459" y="216" width="18" height="2.8" rx="1.4" fill="#364b63"/>
  <rect x="1459" y="224" width="18" height="2.8" rx="1.4" fill="#364b63"/>

  <!-- Open drawer -->
  <rect x="1214" y="268" width="288" height="290" rx="20" fill="#ffffff" stroke="#d9e1ed" filter="url(#shadow)"/>
  <rect x="1232" y="288" width="252" height="52" rx="14" fill="#f6f8fc"/>
  <text x="1333" y="321" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" fill="#33455b">Math</text>

  <rect x="1232" y="350" width="252" height="52" rx="14" fill="url(#pill)"/>
  <text x="1333" y="383" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#ffffff">Langues</text>

  <rect x="1232" y="412" width="252" height="52" rx="14" fill="#f6f8fc"/>
  <text x="1333" y="445" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" fill="#33455b">A propos</text>

  <rect x="1232" y="474" width="252" height="52" rx="14" fill="#f6f8fc"/>
  <text x="1333" y="507" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" fill="#33455b">Confidentialite</text>

  <rect x="1128" y="580" width="374" height="272" rx="22" fill="#f7fbff" stroke="#e4edf7"/>
  <text x="1160" y="635" font-family="Segoe UI, Arial" font-size="34" font-weight="800" fill="#243041">Content</text>

  <text x="70" y="934" font-family="Segoe UI, Arial" font-size="24" fill="#4b5f79">Principes: barre flottante, actifs en pill, menu mobile en drawer, zones de clic larges.</text>
</svg>
