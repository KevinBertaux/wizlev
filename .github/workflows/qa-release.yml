name: QA Release Automation

on:
  pull_request:
    branches:
      - main
      - feat/0.*-prep
  push:
    branches:
      - main
      - feat/0.*-prep

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Brand guard
        run: npm run check:brand

      - name: Route guard
        run: npm run check:routes

      - name: Storage key guard
        run: npm run check:storage-keys

      - name: Legal guard
        run: npm run check:legal

      - name: Env guard
        run: npm run check:env

      - name: Breakpoint guard
        run: npm run check:breakpoints

      - name: Px value guard
        run: npm run check:px-values

      - name: Unit + coverage
        run: npm test -- --coverage

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: npm run lighthouse:ci

  e2e-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - desktop-chromium
          - desktop-firefox
          - desktop-webkit
          - mobile-chrome
          - mobile-safari
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }} --grep-invert @visual
  release-ready:
    runs-on: ubuntu-latest
    needs:
      - quality-gate
      - e2e-matrix
    if: ${{ always() }}
    steps:
      - name: Enforce upstream QA jobs
        shell: bash
        run: |
          [ "${{ needs.quality-gate.result }}" = "success" ]
          [ "${{ needs.e2e-matrix.result }}" = "success" ]