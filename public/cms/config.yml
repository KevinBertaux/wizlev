backend:
  name: git-gateway
  branch: main

locale: 'fr'
media_folder: 'public/uploads'
public_folder: '/uploads'

collections:
  - name: 'vocab_en'
    label: 'Vocabulaire anglais'
    format: 'json'
    extension: 'json'
    files:
      - label: 'Fruits'
        name: 'fruits'
        file: 'src/content/vocab/en/fruits.json'
        fields:
          - { label: 'Nom', name: 'name', widget: 'string' }
          - { label: 'Description', name: 'description', widget: 'string', required: false }
          - label: 'Mots'
            name: 'words'
            widget: 'list'
            summary: '{{fields.english}} -> {{fields.french}}'
            fields:
              - { label: 'Anglais', name: 'english', widget: 'string' }
              - { label: 'Français', name: 'french', widget: 'string' }
      - label: 'Légumes'
        name: 'legumes'
        file: 'src/content/vocab/en/legumes.json'
        fields:
          - { label: 'Nom', name: 'name', widget: 'string' }
          - { label: 'Description', name: 'description', widget: 'string', required: false }
          - label: 'Mots'
            name: 'words'
            widget: 'list'
            summary: '{{fields.english}} -> {{fields.french}}'
            fields:
              - { label: 'Anglais', name: 'english', widget: 'string' }
              - { label: 'Français', name: 'french', widget: 'string' }
